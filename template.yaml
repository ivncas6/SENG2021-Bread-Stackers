AWSTemplateFormatVersion: 2010-09-09
Description: >-
  Breadstackers-AWS
Transform:
- AWS::Serverless-2016-10-31

Parameters:
  JWTSecretParameter:
    Type: String
    Description: Secret key that signs JWTs
  SupabaseUrl:
    Type: String
    Description: "Your Supabase Project URL"
  SupabaseKey:
    Type: String
    Description: "Your Supabase Anon/Public Key"

# Resources declares the AWS resources that you want to include in the stack
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html
Resources:

  BreadStackersApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: finalAPISprint2Release
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE'"
        AllowHeaders: "'Content-Type,x-api-key,session'"
        AllowOrigin: "'*'"
      Auth:
        ApiKeyRequired: true
        AddApiKeyRequiredToCorsPreflight: false
        UsagePlan:
          CreateUsagePlan: PER_API
          UsagePlanName: BreadStackersPlan
          # Usage limits - change if needed
          Throttle: 
            # 10 reqs/s
            RateLimit: 10
            # 20 reqs at once
            BurstLimit: 20
          Quota:
            # 1000 reqs/day
            Limit: 1000
            Period: DAY

# Add handlers here whenever you create a new Lambda, see the template below. Make sure y'all remove the '{}' too:

  createOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/createOrder.createOrderHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BreadStackersApi
            Path: /v0/order
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/handlers/createOrder.ts
  
  listOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/listOrder.listOrderHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BreadStackersApi
            Path: /v0/order/list
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/handlers/listOrder.ts
  
  getOrderInfoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/orderInfo.getOrderInfoHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BreadStackersApi
            Path: /v0/order/{orderId}
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/handlers/orderInfo.ts
  
  updateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/updateOrder.updateOrderHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BreadStackersApi
            Path: /v0/order/{orderId}
            Method: PUT
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/handlers/updateOrder.ts
  
  cancelOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/cancelOrder.cancelOrderHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BreadStackersApi
            Path: /v0/order/{orderId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/handlers/cancelOrder.ts
  
  userRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/userRegister.registerUserHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BreadStackersApi
            Path: /v0/user/register
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/handlers/userRegister.ts
  
  userLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/userLogin.userLoginHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BreadStackersApi
            Path: /v0/user/login
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/handlers/userLogin.ts
  
  userDetailsUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/userDetails.updateUserDetailsHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BreadStackersApi
            Path: /v0/user/details
            Method: PUT
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/handlers/userDetails.ts
  
  userLogoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/userLogout.userLogoutHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref BreadStackersApi
            Path: /v0/user/logout
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/handlers/userLogout.ts
    

Outputs:
  WebEndpoint:
    Description: API Gateway endpoint URL for final sprint2 stage
    Value: !Sub "https://${BreadStackersApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/https://tx12cup9z0.execute-api.ap-southeast-2.amazonaws.com/Sprint2Final/"


# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Runtime: nodejs20.x
    Environment:
      Variables:
        JWT_SECRET: !Ref JWTSecretParameter
        SUPABASE_URL: !Ref SupabaseUrl
        SUPABASE_KEY: !Ref SupabaseKey
    Architectures:
      - x86_64
    MemorySize: 128
    Timeout: 30
    LoggingConfig:
      LogFormat: JSON
