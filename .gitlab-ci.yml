# This file is used for continuous integration

image: node:22

stages:
  - concurChecks
  - deploy

before_script:
  - npm install

linting:
  stage: concurChecks
  only:
    - main
    - merge_requests
  script:
    - echo "Linting code..."
    - npx eslint .

testing:
  stage: concurChecks
  only:
    - main
    - merge_requests
  script:
    - echo "Running unit tests..."
    - npm test

deploy_preview:
  stage: deploy
  except:
    - main
  script:
    - npm install --global vercel@latest
    - echo "Deploying preview frontend to Vercel"
    - vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
    - vercel build --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt --token=$VERCEL_TOKEN

deploy_production:
  stage: deploy
  only:
    - main
  script:
    - npm install --global vercel@latest
    - echo "Deploying production frontend to Vercel"
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - vercel build --prod --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
