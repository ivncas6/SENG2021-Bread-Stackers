  # V2 - Addresses

  /v2/address:
    post:
      tags: ["v2 - Addresses"]
      summary: Create a new reusable address
      description: >
        Creates an address record that can then be referenced by its `addressId` when
        creating or updating V2 orders, or when creating an organisation.
      parameters:
        - in: header
          name: session
          required: true
          type: string
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/addressCreate'
      responses:
        200:
          description: "**SUCCESS**"
          schema:
            $ref: '#/definitions/addressId'
        400:
          description: |
            **INVALID INPUT**
            - Street is required
            - Street address is too long
          schema:
            $ref: '#/definitions/error400'
        401:
          description: "**UNAUTHORISED**"
          schema:
            $ref: '#/definitions/error401'

  /v2/address/{addressId}:
    get:
      tags: ["v2 - Addresses"]
      summary: Retrieve an address by ID
      parameters:
        - in: path
          name: addressId
          required: true
          type: integer
        - in: header
          name: session
          required: true
          type: string
      responses:
        200:
          description: "**SUCCESS**"
          schema:
            $ref: '#/definitions/addressView'
        400:
          description: "**INVALID INPUT** – address not found"
          schema:
            $ref: '#/definitions/error400'
        401:
          description: "**UNAUTHORISED**"
          schema:
            $ref: '#/definitions/error401'

    put:
      tags: ["v2 - Addresses"]
      summary: Update address fields (any authenticated user)
      description: All fields are optional - only fields included in the body are updated.
      parameters:
        - in: path
          name: addressId
          required: true
          type: integer
        - in: header
          name: session
          required: true
          type: string
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/addressUpdate'
      responses:
        200:
          description: "**SUCCESS**"
          schema:
            $ref: '#/definitions/addressId'
        400:
          description: |
            **INVALID INPUT**
            - Address not found
            - No fields provided for update
            - Street address is too long
          schema:
            $ref: '#/definitions/error400'
        401:
          description: "**UNAUTHORISED**"
          schema:
            $ref: '#/definitions/error401'

    delete:
      tags: ["v2 - Addresses"]
      summary: Delete an address (only if not in use by any order or organisation)
      parameters:
        - in: path
          name: addressId
          required: true
          type: integer
        - in: header
          name: session
          required: true
          type: string
      responses:
        200:
          description: "**SUCCESS**"
          schema:
            $ref: '#/definitions/emptyObj'
        400:
          description: |
            **INVALID INPUT**
            - Address not found
            - Address in use by an existing order delivery
            - Address in use by an organisation
          schema:
            $ref: '#/definitions/error400'
        401:
          description: "**UNAUTHORISED**"
          schema:
            $ref: '#/definitions/error401'